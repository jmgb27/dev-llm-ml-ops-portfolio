# CI builds and pushes chat-ui; ArgoCD syncs the tag from k8s/kustomization.yaml.
# Registry host is configured outside Git (ansible/group_vars/secrets.yml + ArgoCD kustomize override).
# One-time on cluster: ./scripts/apply-registry-secret.sh
apiVersion: apps/v1
kind: Deployment
metadata:
    name: chat-ui
    namespace: llm-gateway
    labels:
        app: chat-ui
        app.kubernetes.io/component: webui
spec:
    replicas: 1
    selector:
        matchLabels:
            app: chat-ui
    template:
        metadata:
            labels:
                app: chat-ui
                app.kubernetes.io/component: webui
        spec:
            imagePullSecrets:
                - name: registry-credentials
            nodeSelector:
                cpu-feature: base
            containers:
                - name: chat-ui
                  image: chat-ui:bootstrap
                  imagePullPolicy: IfNotPresent
                  ports:
                      - name: http
                        containerPort: 8000
                  env:
                      - name: LITELLM_BASE_URL
                        value: http://litellm:4000
                      - name: LITELLM_MODEL
                        value: llama3
                      - name: LITELLM_API_KEY
                        valueFrom:
                            secretKeyRef:
                                name: litellm-credentials
                                key: master-key
                  readinessProbe:
                      httpGet:
                          path: /healthz
                          port: http
                      initialDelaySeconds: 5
                      periodSeconds: 10
                  resources:
                      requests:
                          cpu: 50m
                          memory: 128Mi
                      limits:
                          cpu: 500m
                          memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
    name: chat-ui
    namespace: llm-gateway
    labels:
        app: chat-ui
spec:
    selector:
        app: chat-ui
    ports:
        - name: http
          port: 8000
          targetPort: http

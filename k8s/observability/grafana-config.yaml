apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: llm-gateway
  labels:
    app: grafana
data:
  prometheus.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: llm-gateway
  labels:
    app: grafana
data:
  dashboard.yml: |
    apiVersion: 1

    providers:
      - name: LLM Gateway
        orgId: 1
        folder: LLM Gateway
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

# Create after provisioning a Cloudflare Tunnel in Zero Trust.
# https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/get-started/create-remote-tunnel/
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-credentials
  namespace: llm-gateway
  labels:
    app: cloudflared
type: Opaque
stringData:
  tunnel-token: "REPLACE_WITH_CLOUDFLARE_TUNNEL_TOKEN"

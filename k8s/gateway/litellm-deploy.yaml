apiVersion: apps/v1
kind: Deployment
metadata:
    name: litellm
    namespace: llm-gateway
    labels:
        app: litellm
        app.kubernetes.io/component: gateway
spec:
    replicas: 1
    selector:
        matchLabels:
            app: litellm
    template:
        metadata:
            labels:
                app: litellm
                app.kubernetes.io/component: gateway
        spec:
            nodeSelector:
                cpu-feature: base
            containers:
                - name: litellm
                  image: ghcr.io/berriai/litellm:main-latest
                  args:
                      - --config
                      - /app/config.yaml
                  ports:
                      - name: http
                        containerPort: 4000
                  env:
                      - name: LITELLM_MASTER_KEY
                        valueFrom:
                            secretKeyRef:
                                name: litellm-credentials
                                key: master-key
                      - name: REDIS_HOST
                        value: redis
                      - name: REDIS_PORT
                        value: "6379"
                      - name: REDIS_PASSWORD
                        value: ""
                      - name: LITELLM_GLOBAL_MAX_PARALLEL_REQUEST_RETRIES
                        value: "10"
                      - name: LITELLM_GLOBAL_MAX_PARALLEL_REQUEST_RETRY_TIMEOUT
                        value: "120"
                  volumeMounts:
                      - name: config
                        mountPath: /app/config.yaml
                        subPath: config.yaml
                        readOnly: true
                  readinessProbe:
                      httpGet:
                          path: /health/liveliness
                          port: http
                      initialDelaySeconds: 30
                      periodSeconds: 15
                  resources:
                      requests:
                          cpu: 250m
                          memory: 512Mi
                      limits:
                          cpu: "2"
                          memory: 2Gi
            volumes:
                - name: config
                  configMap:
                      name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
    name: litellm
    namespace: llm-gateway
    labels:
        app: litellm
spec:
    selector:
        app: litellm
    ports:
        - name: http
          port: 4000
          targetPort: http

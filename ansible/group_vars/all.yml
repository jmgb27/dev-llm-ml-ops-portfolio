# Pin a version for reproducibility, e.g. v1.32.2+k3s1 — leave empty for latest stable.
k3s_version: ""

k3s_server_url: "https://{{ hostvars[groups['k3s_master'][0]].ansible_host }}:6443"

# --- LLM stack deploy (deploy-llm-stack.yml) ---

llm_model_filename: Llama-3.2-1B-Instruct-Q4_K_M.gguf
llm_model_local_path: "{{ playbook_dir }}/../models/{{ llm_model_filename }}"
llm_model_host_dir: /var/lib/llm-models
llm_skip_model_copy: false

istio_version: "1.24.2"
istio_install_dir: "/opt/istio-{{ istio_version }}"
# istioctl uses --wait=false; ztunnel is waited on after the K3s CNI symlink fix.
istio_ztunnel_rollout_timeout: 600
gateway_api_version: "v1.2.1"
gateway_api_manifest_url: >-
  https://github.com/kubernetes-sigs/gateway-api/releases/download/{{ gateway_api_version }}/standard-install.yaml

llm_gateway_namespace: llm-gateway

# Fetch kubeconfig to ansible/kubeconfig/ when running deploy with --tags kubeconfig
llm_kubeconfig_local_dir: "{{ playbook_dir }}/kubeconfig"

# --- ArgoCD GitOps (deploy-argocd.yml) ---

argocd_version: "v3.3.5"
argocd_namespace: argocd
argocd_install_manifest: >-
  https://raw.githubusercontent.com/argoproj/argo-cd/{{ argocd_version }}/manifests/install.yaml
argocd_application_name: llm-gateway
argocd_application_file: "{{ playbook_dir }}/../k8s/argocd/application.yaml"
argocd_app_rollout_timeout: 600

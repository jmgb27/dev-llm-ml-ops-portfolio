global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: litellm
    metrics_path: /metrics/
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/litellm_bearer_token
    static_configs:
      - targets: ["litellm-gateway:4000"]

  - job_name: llama-cpp
    metrics_path: /metrics
    static_configs:
      - targets: ["llama-worker-01:8080"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  litellm-gateway:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-gateway
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      LITELLM_GLOBAL_MAX_PARALLEL_REQUEST_RETRIES: ${LITELLM_GLOBAL_MAX_PARALLEL_REQUEST_RETRIES:-10}
      LITELLM_GLOBAL_MAX_PARALLEL_REQUEST_RETRY_TIMEOUT: ${LITELLM_GLOBAL_MAX_PARALLEL_REQUEST_RETRY_TIMEOUT:-120}
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    command:
      - --config
      - /app/config.yaml
    depends_on:
      redis:
        condition: service_healthy
      llama-worker-01:
        condition: service_healthy
    restart: unless-stopped

  llama-worker-01:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-worker-01
    ports:
      - "${HOST_PORT:-8080}:8080"
    volumes:
      - ./models:/models:ro
    command:
      - -m
      - /models/${MODEL_FILE:-Llama-3.2-1B-Instruct-Q4_K_M.gguf}
      - -c
      - "${CONTEXT_SIZE:-4096}"
      - --host
      - 0.0.0.0
      - -cb
      - --parallel
      - "${PARALLEL:-4}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

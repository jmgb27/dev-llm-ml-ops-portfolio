services:
  litellm-gateway:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-gateway
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-1234}
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    command:
      - --config
      - /app/config.yaml
      - --detailed_debug
    depends_on:
      llama-worker-01:
        condition: service_healthy
    restart: unless-stopped

  llama-worker-01:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-worker-01
    ports:
      - "${HOST_PORT:-8080}:8080"
    volumes:
      - ./models:/models:ro
    command:
      - -m
      - /models/${MODEL_FILE:-Llama-3.2-1B-Instruct-Q4_K_M.gguf}
      - -c
      - "${CONTEXT_SIZE:-4096}"
      - --host
      - 0.0.0.0
      - -cb
      - --parallel
      - "${PARALLEL:-4}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
